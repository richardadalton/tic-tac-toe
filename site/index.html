<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReST tic-tac-toe</title>

    <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="title">Tic Tac Toe</h1>
    </header>
    <main class="board-wrap" role="main">
      <!-- responsive svg: use viewBox so it scales; keep defs and board group as before -->
      <svg class="board-svg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet" aria-label="game board">
        <defs>
            <g id="o-piece">
                <rect width="100" height="100" fill-opacity="0"/>
                <circle id="o-piece" cx="50" cy="50" r="45" fill-opacity="0" stroke="black" stroke-width="2"/>
            </g>

            <g id="x-piece">
                <rect width="100" height="100" fill-opacity="0"/>
                <line x1="5" y1="5" x2="95" y2="95" style="stroke:black;stroke-width:2" />
                <line x1="95" y1="5" x2="5" y2="95" style="stroke:black;stroke-width:2" />
            </g>

            <g id="blank">
                <rect width="100" height="100" fill-opacity="0"/>
            </g>

            <g id="grid">
                <line x1="100" y1="0" x2="100" y2="300" style="stroke:black;stroke-width:2" />
                <line x1="200" y1="0" x2="200" y2="300" style="stroke:black;stroke-width:2" />

                <line x1="0" y1="100" x2="300" y2="100" style="stroke:black;stroke-width:2" />
                <line x1="0" y1="200" x2="300" y2="200" style="stroke:black;stroke-width:2" />
            </g>
        </defs>

        <g id="board">
          <use class="gridlines" href="#grid" x="0" y="0" />
        </g>
      </svg>
    </main>

    <result>
        <button id="new_game_link" class="btn">New Game</button>
        <p id="result_text"></p>
    </result>


    <footer class="app-footer" aria-hidden="true">
        <small>Simple single-file UI, with an attempt at something like a true <a href="https://en.wikipedia.org/wiki/HATEOAS">HATEOAS ReST API</a> as a backend.</small>
    </footer>

  </div>

    <script src="static/site.js" type="application/javascript"></script>

</body>
</html>
